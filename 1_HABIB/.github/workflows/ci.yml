name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

      - name: Smoke test (synthetic end-to-end)
        run: python scripts/smoke_test.py

      - name: Execute final pipeline notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute notebooks/99_final_pipeline.ipynb \
            --output 99_final_pipeline.executed.ipynb \
            --ExecutePreprocessor.timeout=600
